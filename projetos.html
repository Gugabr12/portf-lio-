<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projetos — OGUGADSGN</title>
  <meta name="description" content="Todos os projetos de design de Gustavo Dias.">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --color-bg-primary: #000000;
      --color-bg-card: #131313;
      --color-accent: #0055FE;
      --color-accent-hover: #0044cc;
      --color-text-primary: #FFFFFF;
      --color-text-secondary: rgba(255, 255, 255, 0.6);
      --color-text-muted: rgba(255, 255, 255, 0.2);
      --color-border: rgba(255, 255, 255, 0.12);
      --color-border-subtle: rgba(255, 255, 255, 0.06);
      --shadow-glow-sm: rgba(0, 85, 255, 0.35) 2px 4px 24px 0px;
      --font-family: "DM Sans", sans-serif;
      --fs-xs: 12px;
      --fs-sm: 14px;
      --fs-base: 16px;
      --fs-md: 18px;
      --fw-regular: 400;
      --fw-medium: 500;
      --fw-semibold: 600;
      --fw-bold: 700;
      --radius-pill: 50px;
      --radius-3xl: 20px;
      --space-xs: 8px;
      --space-sm: 16px;
      --space-md: 24px;
      --space-lg: 40px;
      --space-xl: 60px;
      --space-2xl: 100px;
      --transition-base: all 0.2s ease;
      --transition-slow: all 0.4s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family);
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      font-size: var(--fs-base);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 var(--space-md);
    }

    a { color: inherit; }

    /* ===== Navbar ===== */
    .navbar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      width: calc(100% - 48px);
      max-width: 1100px;
    }

    .navbar__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: rgba(8, 8, 8, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-pill);
    }

    .navbar__logo {
      font-size: var(--fs-base);
      font-weight: var(--fw-bold);
      text-decoration: none;
      letter-spacing: -0.04em;
    }

    .navbar__back {
      font-size: var(--fs-sm);
      color: var(--color-text-secondary);
      text-decoration: none;
      transition: var(--transition-base);
    }

    .navbar__back:hover { color: var(--color-text-primary); }

    /* ===== Header ===== */
    .page-header {
      padding: 160px 0 var(--space-lg);
      position: relative;
      overflow: hidden;
    }

    .page-header__bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 30% 0%, rgba(0, 85, 254, 0.18), transparent 65%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-pill);
      font-size: var(--fs-xs);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-md);
      position: relative;
      z-index: 2;
    }

    .eyebrow::before { content: '•'; color: var(--color-accent); }

    .page-header h1 {
      font-size: clamp(32px, 5.5vw, 58px);
      font-weight: 460;
      line-height: 1.05;
      letter-spacing: -0.03em;
      max-width: 720px;
      position: relative;
      z-index: 2;
    }

    /* ===== Filtros ===== */
    .filters-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: var(--space-lg) 0;
      border-bottom: 1px solid var(--color-border-subtle);
      margin-bottom: var(--space-xl);
    }

    .filters-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-right: 6px;
    }

    .filter-pill {
      padding: 8px 18px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--color-border);
      background: var(--color-bg-card);
      color: var(--color-text-secondary);
      font-size: var(--fs-sm);
      font-family: var(--font-family);
      cursor: pointer;
      transition: var(--transition-base);
    }

    .filter-pill:hover {
      border-color: rgba(0, 85, 254, 0.4);
      color: var(--color-text-primary);
    }

    .filter-pill.active {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #fff;
      box-shadow: var(--shadow-glow-sm);
    }

    /* ===== Grid de projetos (reaproveita o componente case-card) ===== */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-lg);
      padding-bottom: var(--space-2xl);
    }

    .case-card {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .case-card__media {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-3xl);
      border: 1px solid var(--color-border);
      aspect-ratio: 16/10;
      background: var(--color-bg-card);
    }

    .case-card__media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: var(--transition-slow);
    }

    .case-card:hover .case-card__media img { transform: scale(1.03); }

    .case-card__meta {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--space-md);
      padding-top: var(--space-md);
      margin-top: var(--space-md);
      border-top: 1px solid var(--color-border-subtle);
    }

    .case-card__title {
      font-size: var(--fs-md);
      font-weight: var(--fw-medium);
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .case-card__sub { font-size: var(--fs-sm); color: var(--color-text-secondary); }

    .case-card__link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      font-size: var(--fs-sm);
      color: var(--color-text-secondary);
      transition: var(--transition-base);
      white-space: nowrap;
    }

    .case-card:hover .case-card__link { color: var(--color-text-primary); }

    .case-card__link-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      min-width: 28px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--color-border);
      border-radius: 50%;
      font-size: 13px;
      transition: var(--transition-base);
    }

    .case-card:hover .case-card__link-icon {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #fff;
    }

    #emptyState {
      display: none;
      padding: var(--space-2xl) 0;
      text-align: center;
      color: var(--color-text-secondary);
    }

    footer {
      padding: var(--space-lg) 0;
      border-top: 1px solid var(--color-border-subtle);
    }

    footer .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-sm);
    }

    .footer__logo {
      font-size: var(--fs-base);
      font-weight: var(--fw-bold);
      text-decoration: none;
      letter-spacing: -0.04em;
    }

    .footer__copy { font-size: var(--fs-xs); color: var(--color-text-muted); }

    @media (max-width: 700px) {
      .projects-grid { grid-template-columns: 1fr; }
      .page-header { padding-top: 120px; }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo">OGUGADSGN</a>
      <a href="index.html#portfolio" class="navbar__back">← Voltar pro site</a>
    </div>
  </nav>

  <header class="page-header">
    <div class="page-header__bg"></div>
    <div class="container">
      <div class="eyebrow">Portfólio completo</div>
      <h1>Veja alguns projetos de sucesso que desenvolvemos.</h1>
    </div>
  </header>

  <div class="container">
    <div class="filters-row" id="filtersRow">
      <span class="filters-label">Filtro</span>
      <!-- pills injetados por JS -->
    </div>

    <div class="projects-grid" id="projectsGrid"></div>

    <p id="emptyState">Nenhum projeto com esse filtro ainda.</p>
  </div>

  <footer>
    <div class="container">
      <a href="index.html" class="footer__logo">OGUGADSGN</a>
      <p class="footer__copy">© 2025 Gustavo Dias de Jesus. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script src="supabase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="cases.js"></script>
  <script>
    (async function () {
      const filtersRow = document.getElementById('filtersRow');
      const grid = document.getElementById('projectsGrid');
      const emptyState = document.getElementById('emptyState');

      const projects = await getAllProjects();

      // Monta a lista de categorias a partir das tags de todos os projetos.
      const allTags = [];
      projects.forEach(function (p) {
        (p.tags || []).forEach(function (t) {
          if (allTags.indexOf(t) === -1) allTags.push(t);
        });
      });

      let activeFilter = 'Todos';

      function renderPills() {
        filtersRow.querySelectorAll('.filter-pill').forEach(function (el) { el.remove(); });
        ['Todos'].concat(allTags).forEach(function (tag) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'filter-pill' + (tag === activeFilter ? ' active' : '');
          btn.textContent = tag;
          btn.addEventListener('click', function () {
            activeFilter = tag;
            renderPills();
            renderGrid();
          });
          filtersRow.appendChild(btn);
        });
      }

      function renderGrid() {
        grid.innerHTML = '';
        const filtered = activeFilter === 'Todos'
          ? projects
          : projects.filter(function (p) { return (p.tags || []).indexOf(activeFilter) !== -1; });

        emptyState.style.display = filtered.length ? 'none' : 'block';
        filtered.forEach(function (project) {
          grid.appendChild(renderCaseCard(project, false));
        });
      }

      renderPills();
      renderGrid();
    })();
  </script>
</body>

</html>
